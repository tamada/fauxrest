baseURL = "https://tamada.github.io/prest"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "prest"
googleAnalytics = ""
theme = ["github.com/tamada/hugo_theme_mod", "github.com/nunocoracao/blowfish/v2"]

[params]
logo = "images/prest.svg" # relative path from docs/assets.
description = "Pseudo-REST Static API Generator"
dateFormat = "2006-01-02"
copyright = "Copyright &copy; 2026 by Haruaki Tamada. Made with [Hugo](https://gohugo.io/). Deployed to [GitHub Pages](https://pages.github.com/)."

[menus]
[[menus.main]]
    name = "⭐️ Features"
    pageRef = "/features"
    weight = 100
[[menus.main]]
    name = "⚙️  Configuration"
    pageRef = "/config"
    weight = 200
[[menus.main]]
    name = "⚓️ Install"
    pageRef = "/install"
    weight = 300
[[menus.main]]
    name = "🏃 Usage"
    pageRef = "/cli"
    weight = 400
[[menus.main]]
    name = "🚶 API Examples"
    pageRef = "/examples"
    weight = 500
[[menus.main]]
    name = "👩‍💻 How to contribute 🧑‍💻"
    pageRef = "/contribute"
    weight = 1000
[[menus.main]]
    identifier = "haruaki-tamada"
    pre = "haruaki-tamada"
    url = "https://tamada.github.io"
    weight = 100
[[menus.main]]
    identifier = "github"
    pre = "github"
    url = "https://github.com/tamada/lis"
    weight = 200
[[menus.footer]]
    name = ":smile: About"
    pageRef = "/about"
    weight = 50

[module]
